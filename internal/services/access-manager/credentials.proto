syntax = "proto3";
option go_package = "internal/services/accessmanager";

package accessmanager;

message DataInfo {
  repeated string delegatedAttributes = 1; // if non-empty, these are the attributes to pass through (delegate)
}

message DataCredentialProvider {
  string factory = 1;  // URL of credential factory
}