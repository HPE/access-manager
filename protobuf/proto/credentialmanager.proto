syntax = "proto3";
option go_package = "./am-proto";

package accessmanager;

import "access-manager/accessmanager.proto";
import "metadata/meta.proto";

message GetCredentialRequest {
  string url = 1;
  string wildCardUrl = 2;
  repeated metadata.Operation operations = 3;
  string path = 4;
  string caller_id = 5;
}

message GetCredentialResponse {
  map<string, string> credentials = 2;
  Status error = 3;
}

service CredentialManager {
  rpc GetTemporaryCredential(GetCredentialRequest) returns (GetCredentialResponse);
}